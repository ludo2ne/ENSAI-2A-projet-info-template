version: "3.8"

services:
  backend:
    build:
      context: .
      dockerfile: backend/Dockerfile
    ports:
      - "5000:5000"
    environment:
      - POSTGRES_HOST=postgres
      - POSTGRES_PORT=5432
      - POSTGRES_DATABASE=defaultdb
      - POSTGRES_USER=user
      - POSTGRES_PASSWORD=password
      - POSTGRES_SCHEMA=project
      - UVICORN_HOST=0.0.0.0
      - UVICORN_PORT=5000
      - ELO_K_FACTOR=32
    depends_on:
      - postgres

  frontend:
    build:
      context: .
      dockerfile: frontend/Dockerfile
    ports:
      - "8000:8000"
    environment:
      - BACKEND_URL=http://backend:5000
      - BACKEND_TIMEOUT=5
    depends_on:
      - backend

  postgres:
    image: postgres:latest
    environment:
      POSTGRES_USER: user
      POSTGRES_PASSWORD: password
      POSTGRES_DB: defaultdb
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data:
