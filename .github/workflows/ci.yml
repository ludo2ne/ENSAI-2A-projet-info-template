name: pipeline

on: [push]

jobs:
  backend:
    runs-on: ubuntu-latest

    strategy:
      matrix:
        python-version: ["3.13"]

    services:
      postgres:
        image: postgres:latest
        env:
          POSTGRES_DB: test_db
          POSTGRES_USER: postgres_user
          POSTGRES_PASSWORD: postgres_pwd
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres_user -d test_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        run: |
          curl -Ls https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-backend-${{ runner.os }}-${{ hashFiles('backend/uv.lock') }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync backend dependencies
        run: uv sync --project backend --all-extras

      - name: Wait for PostgreSQL
        run: |
          until pg_isready -h localhost -p 5432 -U postgres_user -d test_db; do
            echo "Waiting for PostgreSQL..."
            sleep 1
          done

      - name: Run backend tests with coverage
        env:
          POSTGRES_HOST: localhost
          POSTGRES_PORT: 5432
          POSTGRES_DATABASE: test_db
          POSTGRES_USER: postgres_user
          POSTGRES_PASSWORD: postgres_pwd
          POSTGRES_SCHEMA: projet
        run: |
          uv run --project backend coverage run -m pytest
          uv run --project backend coverage report

      - name: Lint backend with Ruff
        run: uv run --project backend ruff check backend/src backend/tests

      - name: Security scan backend
        run: uv run --project backend bandit -r backend/src

  frontend:
    runs-on: ubuntu-latest
    needs: backend  # optionnel : attendre le backend si nécessaire

    strategy:
      matrix:
        python-version: ["3.13"]

    steps:
      - uses: actions/checkout@v6

      - name: Install uv
        run: |
          curl -Ls https://astral.sh/uv/install.sh | sh
          echo "$HOME/.cargo/bin" >> $GITHUB_PATH

      - name: Cache uv
        uses: actions/cache@v4
        with:
          path: ~/.cache/uv
          key: uv-frontend-${{ runner.os }}-${{ hashFiles('frontend/uv.lock') }}

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}

      - name: Sync frontend dependencies
        run: uv sync --project frontend --all-extras

      - name: Lint frontend with Ruff
        run: uv run --project frontend ruff check frontend/src

      - name: Security scan frontend
        run: uv run --project frontend bandit -r frontend/src